name: Deploy to Apillon Web3 Hosting

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Prevent overlapping deploys on rapid pushes
concurrency:
  group: apillon-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build application
        env:
          # Vite needs these at build time — set as GitHub repo variables (Settings → Variables)
          # or fall back to the values committed in .env
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || 'https://rzxondizgsecijptvqtr.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ vars.VITE_SUPABASE_PROJECT_ID || 'rzxondizgsecijptvqtr' }}
          VITE_WALLETCONNECT_PROJECT_ID: ${{ vars.VITE_WALLETCONNECT_PROJECT_ID }}
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f "./dist/index.html" ]; then
            echo "::error::dist/index.html missing — build produced no output"
            exit 1
          fi
          echo "Build size: $(du -sh dist/ | cut -f1)"

      - name: Verify Apillon secrets
        env:
          APILLON_API_KEY: ${{ secrets.APILLON_API_KEY }}
          APILLON_PROJECT_UUID: ${{ secrets.APILLON_PROJECT_UUID }}
          APILLON_WEBSITE_UUID: ${{ secrets.APILLON_WEBSITE_UUID }}
        run: |
          missing=0
          [ -z "$APILLON_API_KEY" ]      && echo "::error::APILLON_API_KEY is not set"      && missing=1
          [ -z "$APILLON_PROJECT_UUID" ] && echo "::error::APILLON_PROJECT_UUID is not set" && missing=1
          [ -z "$APILLON_WEBSITE_UUID" ] && echo "::error::APILLON_WEBSITE_UUID is not set" && missing=1
          [ "$missing" = "1" ] && exit 1
          echo "All Apillon secrets present"

      - name: Deploy to Apillon (production)
        env:
          APILLON_API_KEY: ${{ secrets.APILLON_API_KEY }}
          APILLON_PROJECT_UUID: ${{ secrets.APILLON_PROJECT_UUID }}
          APILLON_WEBSITE_UUID: ${{ secrets.APILLON_WEBSITE_UUID }}
        run: |
          set -e
          npm install -g @apillon/cli@latest
          apillon --version
          apillon hosting deploy ./dist \
            --uuid "$APILLON_WEBSITE_UUID" \
            --key "$APILLON_API_KEY" \
            --secret "$APILLON_API_KEY"

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build application
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || 'https://rzxondizgsecijptvqtr.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ vars.VITE_SUPABASE_PROJECT_ID || 'rzxondizgsecijptvqtr' }}
          VITE_WALLETCONNECT_PROJECT_ID: ${{ vars.VITE_WALLETCONNECT_PROJECT_ID }}
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f "./dist/index.html" ]; then
            echo "::error::dist/index.html missing — build produced no output"
            exit 1
          fi
          echo "Build size: $(du -sh dist/ | cut -f1)"

      - name: Verify Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
        run: |
          missing=0
          [ -z "$CLOUDFLARE_API_TOKEN" ]    && echo "::error::CLOUDFLARE_API_TOKEN is not set"    && missing=1
          [ -z "$CLOUDFLARE_ACCOUNT_ID" ]   && echo "::error::CLOUDFLARE_ACCOUNT_ID is not set"   && missing=1
          [ -z "$CLOUDFLARE_PROJECT_NAME" ] && echo "::error::CLOUDFLARE_PROJECT_NAME is not set" && missing=1
          [ "$missing" = "1" ] && exit 1
          echo "All Cloudflare secrets present"

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages deploy ./dist \
            --project-name "${{ secrets.CLOUDFLARE_PROJECT_NAME }}" \
            --branch "${{ github.ref_name }}" \
            --commit-dirty=true
